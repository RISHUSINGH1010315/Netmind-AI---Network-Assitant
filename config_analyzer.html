                                            wr mem

    <script>
        // Simple drag & drop visual feedback
        const uploadZone = document.querySelector('.glass-card');
        if (uploadZone) {
            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('bg-primary/10', 'border-primary');
            });
            uploadZone.addEventListener('dragleave', () => {
                uploadZone.classList.remove('bg-primary/10', 'border-primary');
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('bg-primary/10', 'border-primary');
                alert('File upload triggered (Simulated)');
            });
        }

        // Mock Progress Bar Increment
        const progressBar = document.querySelector('.h-full.bg-primary');
        const progressText = document.querySelector('.font-code-sm.text-primary');
        let progress = 78;
        setInterval(() => {
            if (progress < 99) {
                progress += Math.random() * 0.5;
                if (progressBar) progressBar.style.width = `${progress}%`;
                if (progressText) progressText.innerText = `${Math.floor(progress)}%`;
            }
        }, 3000);
    </script>
